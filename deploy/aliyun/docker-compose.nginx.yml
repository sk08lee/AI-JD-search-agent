services:
  ai-job-agent:
    image: ${IMAGE}
    container_name: ai-job-agent
    restart: always
    env_file:
      - .env.prod
    expose:
      - "9000"
    volumes:
      - ./output:/app/output

  nginx:
    image: nginx:1.27-alpine
    container_name: ai-job-agent-nginx
    restart: always
    depends_on:
      - ai-job-agent
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
