<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>通用岗位搜索助手</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🚀 实习岗位搜索助手</h1>
            <p>AI 驱动的实习岗位需求分析工具</p>
        </header>

        <main class="main">
            <section class="input-section">
                <div class="form-group">
                    <label for="job-category">岗位方向（可选）</label>
                    <input type="text" id="job-category" class="text-input" placeholder="例如：产品、技术（默认：实习）">
                    <p class="input-hint">用于本地知识库检索方向；官网抓取固定为实习岗位</p>
                </div>

                <div class="form-group">
                    <label for="job-title">具体岗位名称</label>
                    <input type="text" id="job-title" class="text-input" placeholder="例如：AI产品经理、Java后端开发">
                    <p class="input-hint">填写你想搜索的具体岗位名称</p>
                </div>

                <button id="generate-btn" class="generate-btn">
                    <span class="btn-text">生成实习岗位需求报告</span>
                    <span class="btn-spinner" style="display: none;">⏳</span>
                </button>
            </section>

            <section class="output-section" id="output-section" style="display: none;">
                <div class="output-header">
                    <h2>📄 岗位需求报告</h2>
                    <button id="copy-btn" class="copy-btn">复制报告</button>
                </div>
                <div class="output-content" id="output-content"></div>
            </section>

            <div class="loading" id="loading" style="display: none;">
                <div class="spinner"></div>
                <p>正在生成报告，请稍候...</p>
            </div>
        </main>

        <footer class="footer">
            <p>基于 LLM + MCP + RAG 技术构建</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
